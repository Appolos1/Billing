app = "billing-bonsai"
primary_region = "ams"

[build]

[mounts]
  source = "billing_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "3000"
  NODE_ENV = "production"
